spring:
  application:
    name: ${{ values.componentName }}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/${{ values.dbName }}}
    username: ${DB_USER:app}
    password: ${DB_PASSWORD:app}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
      group:
        readiness:
          include: db, readinessState
