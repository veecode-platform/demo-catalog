name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_REPO: ${{ '${{ github.repository }}' }}
      IMAGE_TAG: ${{ '${{ github.sha }}' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        run: mvn -B -ntp verify

      - name: Build image
        run: docker build -t "$IMAGE_REPO:$IMAGE_TAG" .
