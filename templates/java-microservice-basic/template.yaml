apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: java-microservice-basic
  title: Java Microservice — Basic
  description: |
    Production-ready Spring Boot 3 service starter on Java 21 (Maven). Multi-stage Dockerfile,
    /actuator/health endpoint, GitHub Actions CI. Stateless — no persistence layer. Pick
    java-microservice-with-postgres if you need a database. Use this for stateless APIs,
    message consumers, request orchestrators, or thin integration services that don't own data.
  tags:
    - sankhya-demo
    - java
    - microservice
    - spring-boot
    - maven
spec:
  owner: veecode-platform/demo
  type: service

  parameters:
    - title: Service details
      required:
        - componentName
        - description
        - owner
      properties:
        componentName:
          title: Component name
          description: kebab-case identifier (e.g. payments-api). Becomes the repo, Maven artifact, and Backstage component name.
          type: string
          pattern: '^[a-z][a-z0-9-]*[a-z0-9]$'
          ui:autofocus: true
        description:
          title: Description
          description: One-line summary of what the service does.
          type: string
        owner:
          title: Owner
          description: Owning team or user (e.g. group:default/payroll).
          type: string
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: [Group, User]

    - title: Repository
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository location
          description: |
            GitHub destination. When using the UI, the picker fills this automatically.
            When calling via API or MCP, use the format: github.com?owner=<org-or-user>&repo=<repo-name>
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            requestUserCredentials:
              secretsKey: USER_OAUTH_TOKEN
              additionalScopes:
                github:
                  - repo
                  - workflow
            allowedHosts:
              - github.com
        visibility:
          title: Repository visibility
          type: string
          enum: [public, private]
          enumNames: [Public, Private]
          default: private

  steps:
    - id: fetch-skeleton
      name: Fetch skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          componentName: ${{ parameters.componentName }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          repoOwner: ${{ parameters.repoUrl | parseRepoUrl | pick('owner') }}
          repoName: ${{ parameters.repoUrl | parseRepoUrl | pick('repo') }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        repoUrl: ${{ parameters.repoUrl }}
        token: ${{ secrets.USER_OAUTH_TOKEN }}
        defaultBranch: main
        description: ${{ parameters.description }}
        repoVisibility: ${{ parameters.visibility }}

    - id: register
      name: Register in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - url: ${{ steps.publish.output.remoteUrl }}
        title: Source code (GitHub)
      - url: ${{ steps.register.output.entityRef }}
        title: Component in catalog
        icon: catalog
